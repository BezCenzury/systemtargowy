    <meta charset="UTF-8">

    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Google Fonts: Inter -->

<body
    class="font-sans text-slate-900 antialiased bg-slate-50 selection:bg-blue-100 selection:text-blue-900 h-screen flex flex-col items-center justify-center">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5RVBKJGM" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <main class="max-w-2xl w-full mx-auto px-4 text-center">
        <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-10 md:p-16 flex flex-col items-center">

            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-8 shrink-0">
                <svg class="w-10 h-10 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>

            <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 mb-6 tracking-tight">Dziękujemy za przesłane
                dane kontaktowe</h1>

            <p class="text-lg md:text-xl text-slate-600 font-medium mb-10 leading-relaxed max-w-lg">
                Skontaktujemy się z Tobą w ciągu 24 godzin.
            </p>

            <div class="flex flex-col items-center">
                <div class="w-full bg-slate-100 rounded-full h-1.5 mb-4 overflow-hidden relative">
                    <div id="progressBar" class="bg-blue-600 h-1.5 rounded-full absolute top-0 left-0 w-full"
                        style="transition: width 6s linear;"></div>
                </div>
                <p class="text-sm text-slate-400 font-medium">Strona automatycznie powróci do strony głównej za <span
                        id="countdownText" class="text-slate-600 font-bold">6</span> sekund...</p>
            </div>

            <a href="index.html"
                class="mt-8 text-blue-600 font-semibold hover:text-blue-700 transition-colors inline-block">
                Wróć na stronę główną teraz
            </a>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progressBar');
            const countdownText = document.getElementById('countdownText');
            let timeLeft = 6;

            // Animacja loadera paska
            setTimeout(() => {
                progressBar.style.width = '0%';
            }, 50);

            // Odliczanie sekund
            const interval = setInterval(() => {
                timeLeft--;
                countdownText.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    window.location.href = 'index.html';
                }
            }, 1000);
        });
    </script>
</body>

</html>
